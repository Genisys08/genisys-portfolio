<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFF0B0"/>
      <stop offset="35%"  stop-color="#E8C84A"/>
      <stop offset="70%"  stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#7A5510"/>
    </linearGradient>
    <!-- Outer glow layer -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Void-black background -->
  <rect width="64" height="64" rx="13" fill="#050505"/>

  <!-- Hairline gold border -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="11.5"
        fill="none" stroke="#C9A227" stroke-opacity="0.28" stroke-width="1"/>

  <!--
    Serif G rendered as SVG text.
    font-family: Georgia is available on Windows, macOS, Android, iOS, Linux.
    font-size 46px centred at (32, 46) gives a full, well-proportioned glyph.
    filter="url(#glow)" adds the signature gold halo.
  -->
  <text
    x="32"
    y="47"
    font-family="Georgia, 'Times New Roman', Palatino, serif"
    font-size="47"
    font-weight="bold"
    text-anchor="middle"
    fill="url(#g)"
    filter="url(#glow)"
  >G</text>
</svg>
